<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Douglas Palmer — Enter password</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0e1f2b;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
  .box{max-width:380px;width:100%;text-align:center}
  h1{font-size:1.9rem;font-weight:700;letter-spacing:-0.3px}
  .sub{color:#9fb3c2;margin-top:8px;font-size:.98rem}
  form{margin-top:28px}
  input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#fff;font-size:1rem;text-align:center;letter-spacing:.5px}
  input:focus{outline:none;border-color:#3d9bd6;background:rgba(255,255,255,.1)}
  button{width:100%;margin-top:14px;padding:13px;border:0;border-radius:24px;background:#1b6ca8;color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
  button:hover{background:#1f7cc0}
  .err{color:#ff9b8e;font-size:.9rem;margin-top:14px;min-height:1.2em}
  .hint{color:#5f7385;font-size:.82rem;margin-top:22px}
</style>
</head>
<body>
<div class="box">
  <h1>Douglas Palmer</h1>
  <p class="sub">This résumé is private. Please enter the password to continue.</p>
  <form id="f" autocomplete="off">
    <input id="pw" type="password" placeholder="Password" autofocus aria-label="Password">
    <button type="submit">View résumé</button>
    <div class="err" id="err"></div>
  </form>
  <p class="hint">Shared by invitation only.</p>
</div>
<script>
  var HASH = "3965d8fb212afbde1edffdecd385d4d3b94ae91c99e073d75790a2b1cd304080";
  async function sha256(s){
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  document.getElementById("f").addEventListener("submit", async function(e){
    e.preventDefault();
    var pw = document.getElementById("pw").value;
    var h = await sha256(pw);
    if(h === HASH){
      try{ sessionStorage.setItem("dp_auth", HASH); }catch(_){}
      var dest = new URLSearchParams(location.search).get("next") || "index.html";
      location.replace(dest);
    } else {
      document.getElementById("err").textContent = "Incorrect password. Please try again.";
      document.getElementById("pw").value = "";
      document.getElementById("pw").focus();
    }
  });
</script>
</body>
</html>
